[pytest]
asyncio_mode = auto
markers =
    slow: marks tests as slow (complex simulations, ~2-3 min each)
    stability: End-to-end flow stability tests (architecture + pipeline stages)
    mcp: MCP server tool tests (start/get/resume/pause lifecycle)
    graph: LangGraph state machine tests (routing, interrupts, checkpoints)
    e2e: End-to-end integration tests (require Nix + EDA tools)
    live_llm: Tests requiring a live Claude CLI connection (slow, costs money)
    local_arch_stress: Local-only live architecture contract stress tests (LLM, slow, not CI)
    requires_nix: Tests that require Nix package manager on PATH
    doc_persistence: Per-document persistence and doc_store tests
