# H.264-inspired all-intra codec v2.
#
# Reference golden model: examples/multiframe_codec_v2/codec_golden.py
#
# The v2 prompt intentionally upgrades the earlier 4x4-only back-half:
#   - I-frame coding path only
#   - per-macroblock intra prediction modes: DC, vertical, horizontal
#   - selectable 8x8 macroblock transform or four 4x4 transform blocks
#   - scalar QP quantization for both transform sizes
#   - zig-zag/RLE and Exp-Golomb entropy coding
#   - byte packing
#   - simplified H.264-style deblocking filter
#
# Software preflight on the Mort GIF resized to 128x72 confirmed achievable
# PSNR before launching SocMate:
#   qp=24: 2.8508 bpp, 47.98 dB, 667/1440 macroblocks selected as 8x8
#   qp=36: 1.1574 bpp, 39.48 dB, 635/1440 macroblocks selected as 8x8
#   qp=48: 0.3964 bpp, 32.00 dB, 925/1440 macroblocks selected as 8x8

blocks:
  intra_predict:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/intra_predict.v"
    testbench: "tb/cocotb/test_intra_predict.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      I-frame intra predictor for 4x4 and 8x8 luma blocks.

      Supports three H.264-inspired prediction directions selected per block:
        mode 0: DC prediction from available top and left reconstructed pixels
        mode 1: vertical prediction, copying the top row downward
        mode 2: horizontal prediction, copying the left column rightward

      The block accepts a block_size flag (0=4x4, 1=8x8), mode[1:0],
      raster-order source pixels, and top/left reconstructed neighbor samples.
      It emits signed residual samples pixel - predictor in raster order.

      Golden references: _predictor_n(), _available_modes_n(),
      _get_neighbors_n(), and the I-frame path in encode_image_v2().

      Use AXI-Stream for pixel/residual data. Use simple static sideband pins
      for block_size and mode. Single clock, synchronous active-low rst_n.

  transform_select:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/transform_select.v"
    testbench: "tb/cocotb/test_transform_select.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Selectable forward DCT for I-frame residual blocks.

      block_size=0 consumes 16 signed residual samples and emits a 4x4 fp16
      coefficient block. block_size=1 consumes 64 signed residual samples and
      emits an 8x8 fp16 coefficient block. The transforms are separable,
      orthonormal DCT-II matrices.

      Golden references: dct_4x4(), dct_8x8(), dct4_matrix(), dct_matrix(8).

      AXI-Stream input/output with tlast asserted on the final sample or
      coefficient of each block. Sideband block_size is static for one block.

  quantize_select:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/quantize_select.v"
    testbench: "tb/cocotb/test_quantize_select.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Scalar QP quantizer/dequantizer helper for both 4x4 and 8x8 transform
      blocks. For each fp16 coefficient C and 6-bit qp:

          step = 2^((qp - 12) / 6.0)
          level = round_half_to_even(C / step)

      Emits signed int16 levels in raster order and preserves block_size/tlast.
      A reciprocal-step ROM indexed by qp is acceptable.

      Golden references: step_for_qp(), quantize_n(), dequantize_n().

  mode_decision:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/mode_decision.v"
    testbench: "tb/cocotb/test_mode_decision.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Per-8x8 macroblock mode selector.

      For each macroblock, evaluate the candidate 8x8 transform mode and the
      candidate split-4x4 mode. Each candidate uses the best available intra
      prediction direction among DC, vertical, and horizontal. Select the lower
      rate-distortion proxy:

          cost = mean_squared_error + 0.08 * step_for_qp(qp) * bits / samples

      Output selected block_size (1=8x8, 0=four 4x4 subblocks), the selected
      prediction mode(s), and the selected reconstructed macroblock for neighbor
      feedback.

      Golden references: _code_block(), _code_mb_4x4(), encode_image_v2().

  zigzag_rle_select:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/zigzag_rle_select.v"
    testbench: "tb/cocotb/test_zigzag_rle_select.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Zig-zag scan plus run-length encoder for selectable 4x4 or 8x8 quantized
      level blocks.

      block_size=0 scans 16 levels with ZIGZAG_4x4. block_size=1 scans 64
      levels with ZIGZAG_8x8. Emit (run, signed level) pairs followed by one
      EOB sentinel (run=0, level=0).

      Golden references: ZIGZAG_4x4, ZIGZAG_8x8, zigzag_rle_n(),
      unzigzag_rle_n().

  expgolomb_enc:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/expgolomb_enc.v"
    testbench: "tb/cocotb/test_expgolomb_enc_v2.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Exp-Golomb encoder for run/level pairs. Runs are nonnegative. Levels use
      PyH264 signed mapping: +N -> 2N-1, -N -> 2N, 0 -> 0. EOB emits the same
      encoded zero/zero pair used by the software model.

      Golden references: expgolomb_encode(), expgolomb_decode_stream().

  block_packer:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/block_packer.v"
    testbench: "tb/cocotb/test_block_packer_v2.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Bitstream packer for the v2 I-frame syntax. For each 8x8 macroblock,
      emit:

        1 bit  frame_type, always 1 for I-frame
        1 bit  block_size, 1=single 8x8 block, 0=four 4x4 subblocks
        mode bits: one 2-bit mode for 8x8 or four 2-bit modes for split 4x4
        Exp-Golomb run/level payloads

      Pack MSB-first into bytes and zero-pad the final byte.

      Golden references: encode_image_v2() bitstream construction and the
      byte packing loop at the end of encode_image_v2().

  deblock_filter:
    tier: 1
    rtl_target: "rtl/multiframe_codec_v2/deblock_filter.v"
    testbench: "tb/cocotb/test_deblock_filter.py"
    python_source: "examples/multiframe_codec_v2/codec_golden.py"
    description: |
      Simplified H.264-style in-loop deblocking filter for reconstructed luma.

      Filter every 4-pixel boundary, including internal 4x4 boundaries inside
      selected 8x8 macroblocks. For each edge use the six-pixel pattern
      p2 p1 p0 | q0 q1 q2. If |p0-q0| < alpha(qp), |p1-p0| < beta(qp), and
      |q1-q0| < beta(qp), replace p0 and q0 with the weighted 4-tap smoothing
      equations in _deblock_edge_inplace().

      Golden references: _alpha_beta(), _deblock_edge_inplace(), deblock().
