#
# 3-stage pipelined microcontroller smoke test. One block end-to-end
# through RTL gen -> lint -> testbench -> simulation -> synthesis. Used
# to validate the published ghcr.io/facebookexperimental/socmate image
# beyond the trivial adder8 demo.
#
# Loaded into orchestrator/config.yaml's blocks: section via
# SOCMATE_BLOCKS_FILE=examples/mcu3/blocks.yaml.

blocks:
  mcu3:
    tier: 1
    rtl_target: "rtl/mcu3/mcu3.v"
    testbench: "tb/cocotb/test_mcu3.py"
    description: |
      Minimal 3-stage pipelined 8-bit microcontroller targeting Sky130.

      Pipeline stages (all rising-clk-edge synchronous, active-low sync
      reset on rst_n):
        1. FETCH        -- 8-bit PC; on each cycle reads one instruction
                           byte from a 256-byte program ROM (rom_data,
                           addressed by pc). Holds when stall_i is high.
        2. DECODE/EXEC  -- decodes the instruction, reads operands from
                           an 8-entry x 8-bit register file (R0..R7,
                           where R0 reads as zero), performs the ALU op.
        3. WRITEBACK    -- writes the ALU result back to the destination
                           register, or, for the OUT instruction, drives
                           out_o (a memory-mapped output register).

      ISA (8-bit fixed-width opcodes, 8-bit data):
        NOP        opcode 0x00 -- do nothing
        ADD rd,rs  0x10 | (rd<<2) | rs   -- rd <= rd + rs
        SUB rd,rs  0x20 | (rd<<2) | rs   -- rd <= rd - rs
        LDI rd     0x40 | (rd<<2)        -- next byte = imm; rd <= imm
        JMP        0x80                  -- next byte = target PC
        OUT rs     0xC0 | rs             -- out_o <= rs

      Module interface (top-level mcu3):
        input              clk
        input              rst_n        -- active-low synchronous reset
        input              stall_i      -- freeze the fetch stage
        input  [7:0]       rom_data     -- byte at rom[pc]; combinational
        output [7:0]       pc_o         -- current program counter
        output [7:0]       out_o        -- last value written by OUT
        output             halted_o     -- 1 when an undefined opcode is
                                           latched; held until reset

      Constraints (Sky130 sky130_fd_sc_hd):
        - Verilog-2005, synchronous design only
        - No async resets, no latches, no tri-state buffers
        - Reset is active-low SYNCHRONOUS on rst_n
        - Register file initialised to zero on reset; PC starts at 0
        - Use a single always @(posedge clk) per stage for clarity
        - Forward results from WRITEBACK to DECODE/EXEC operand reads
          to avoid a 1-cycle RAW hazard on consecutive ADD/SUB/LDI

      Testbench (Python/cocotb) should:
        - Drive a small ROM with: LDI R1=5; LDI R2=3; ADD R1,R2;
          OUT R1; JMP 0  (looped)
        - Assert that out_o == 8 within ~10 cycles after reset deassertion
        - Toggle stall_i for 2 cycles and verify pc_o doesn't advance
        - Run for ~100 cycles total; pass on no halted_o assertion

      Target: Sky130 sky130_fd_sc_hd. This is a 3-stage pipelined design
      meant to exercise the full RTL gen -> lint -> sim -> synth flow
      with real pipeline + register-file structure (vs. the combinational
      adder8 demo).
