# Multi-frame H.264-style codec back-half (encoder), 6 blocks.
#
# Reference golden model: examples/multiframe_codec/codec_golden.py
# (the Python encoder/decoder we hand-validated end-to-end at PSNR 41.84 dB,
# 0.80 bpp on the test image; see dashboards/socmate-llm-bench/
# multiframe-codec-handwritten/ for the dashboard archive).
#
# Each block points at the SAME codec_golden.py file -- agents pick out the
# relevant function from the file based on the block name + description.  The
# encoder path is: pixels -> frame_subtract -> dct_4x4_fp -> quantize_fp ->
# zigzag_rle -> expgolomb_enc -> block_packer -> bitstream.
#
# All 6 blocks are tier 1 (independent leaves in the dependency graph -- they
# chain via AXI-Stream so each can be developed in isolation, then the
# integration stage stitches them together).

blocks:
  frame_subtract:
    tier: 1
    rtl_target: "rtl/multiframe_codec/frame_subtract.v"
    testbench: "tb/cocotb/test_frame_subtract.py"
    python_source: "examples/multiframe_codec/codec_golden.py"
    description: |
      Per-pixel residual generator.  Subtracts a reference value from each
      8-bit pixel and emits a signed 9-bit residual.

      Two modes (selected per frame by an input flag):
        - intra (is_intra=1):  residual = pixel - 128
        - inter (is_intra=0):  residual = pixel - prev_pixel
                               (prev_pixel arrives on a second AXI-Stream
                                input port, one sample per beat, perfectly
                                paired with current pixel)

      AXI-Stream interface (single clock, sync active-low rst_n):
        // Current frame samples
        input  [7:0]  s_pixel_tdata
        input         s_pixel_tvalid
        output        s_pixel_tready
        // Previous frame samples (consumed only when is_intra=0)
        input  [7:0]  s_prev_tdata
        input         s_prev_tvalid
        output        s_prev_tready
        // Per-frame mode flag (latched on first beat of a frame; held
        // until s_pixel_tlast).  For simplicity it can also be a static
        // input pin updated between frames.
        input         is_intra
        // Residual stream
        output [8:0]  m_resid_tdata  // signed
        output        m_resid_tvalid
        input         m_resid_tready

      Latency: 1 cycle. Throughput: 1 sample/cycle when downstream ready.

      Golden reference in codec_golden.py: the inline subtraction inside
      encode_image() at the line `resid = block - 128` (intra) and the
      `resid = block - prev_block` (inter) variant.  Operates per-pixel,
      not per-4x4-block.

      Sky130 sky130_fd_sc_hd constraints: Verilog-2005, synchronous, no
      latches, no async resets, no tri-states.

  dct_4x4_fp:
    tier: 1
    rtl_target: "rtl/multiframe_codec/dct_4x4_fp.v"
    testbench: "tb/cocotb/test_dct_4x4_fp.py"
    python_source: "examples/multiframe_codec/codec_golden.py"
    description: |
      Forward 4x4 separable DCT-II in fp16.  Consumes signed 9-bit
      residuals 16 at a time (one 4x4 block, raster order: row0 col0..3,
      row1 col0..3, ...), emits 16 fp16 coefficients in raster order.

      The transform is: COEF = DCT4 @ X @ DCT4.T  where DCT4 is the 4x4
      orthonormal cosine basis matrix (see dct4_matrix() in codec_golden.py).
      Compute in fp16 arithmetic throughout.

      AXI-Stream interface:
        // Residual input, 16 beats per block
        input  [8:0]  s_resid_tdata    // signed
        input         s_resid_tvalid
        input         s_resid_tlast    // high on the 16th beat of a block
        output        s_resid_tready
        // Coefficient output, 16 beats per block
        output [15:0] m_coef_tdata     // IEEE 754 binary16
        output        m_coef_tvalid
        output        m_coef_tlast
        input         m_coef_tready

      The block must internally collect a full 4x4 (16 samples) before
      starting the matrix-multiply.  Recommended implementation: 2-stage
      pipeline -- (1) row transform (4 parallel 1D-DCT4 on each row),
      (2) column transform.  Use a small 16x16 fp16 register file for
      the intermediate.

      Golden reference in codec_golden.py: dct_4x4(block) and
      dct4_matrix().  Bit-exactness against numpy fp16 is required to
      within 1 ULP per coefficient.

      Sky130 sky130_fd_sc_hd constraints: Verilog-2005, synchronous, no
      latches, no async resets, no tri-states.  fp16 multipliers should
      use behavioral `*` style code (Yosys + Sky130 can map these via
      DesignWare-style replacement; aim for combinational fp16 mul/add
      cells used inside one-cycle pipeline stages).

  quantize_fp:
    tier: 1
    rtl_target: "rtl/multiframe_codec/quantize_fp.v"
    testbench: "tb/cocotb/test_quantize_fp.py"
    python_source: "examples/multiframe_codec/codec_golden.py"
    description: |
      Per-coefficient quantizer.  For each fp16 DCT coefficient C and a
      6-bit QP input, emit a signed 16-bit integer level:

          step  = 2^((qp - 12) / 6.0)              // fp16
          level = round_half_to_even( C / step )   // banker's rounding
                                                   // to nearest int

      The reciprocal-step table can be precomputed for the 64 QP values
      and stored as a small ROM (Q[qp] = 1/step in fp16).  The quantizer
      then computes level = round( C * Q[qp] ).

      AXI-Stream interface:
        input  [15:0] s_coef_tdata    // fp16
        input         s_coef_tvalid
        input         s_coef_tlast
        output        s_coef_tready
        input  [5:0]  qp              // static-per-frame
        output [15:0] m_level_tdata   // signed int16
        output        m_level_tvalid
        output        m_level_tlast
        input         m_level_tready

      Throughput 1 coef/cycle, latency 1-2 cycles.

      Golden reference in codec_golden.py: step_for_qp(qp), quantize(
      coef, qp).  Note codec_golden defaults use_matrix=False -- this
      block follows the flat per-coefficient quantizer (perceptual
      matrix variant was tried and rejected; it hurt PSNR).

      Sky130 sky130_fd_sc_hd constraints: Verilog-2005, sync, no
      latches, no async resets, no tri-states.

  zigzag_rle:
    tier: 1
    rtl_target: "rtl/multiframe_codec/zigzag_rle.v"
    testbench: "tb/cocotb/test_zigzag_rle.py"
    python_source: "examples/multiframe_codec/codec_golden.py"
    description: |
      Zig-zag scan + run-length encoder.  Consumes 16 signed int16 levels
      per block in raster order (row0 col0..3, row1 col0..3, ...),
      reorders them via the ZIGZAG_4x4 permutation, then RLE-encodes the
      resulting sequence into (run, level) pairs followed by an EOB.

      Encoding rule:
        - scan the 16 levels in zig-zag order
        - emit (run, level) for each nonzero, where run = number of
          consecutive zeros since the last nonzero (or since start)
        - after the last nonzero, emit an EOB sentinel (run=0, level=0)
        - if the entire block is zero, emit only EOB

      AXI-Stream interface:
        // Input: 16 levels per block, raster order
        input  [15:0] s_level_tdata    // signed
        input         s_level_tvalid
        input         s_level_tlast    // high on the 16th beat
        output        s_level_tready
        // Output: (run, level) pairs ended by EOB
        output [3:0]  m_run_tdata      // 0..15
        output [15:0] m_level_tdata    // signed
        output        m_eob_tdata      // 1 marks the EOB pair
        output        m_tvalid
        output        m_tlast          // high on the EOB pair
        input         m_tready

      Implementation: buffer the full 16-level block in a register file,
      then sweep it in zig-zag order emitting one pair per cycle until
      EOB.  Throughput is amortized 16 input beats per block, up to 17
      output beats per block.

      Golden reference in codec_golden.py: ZIGZAG_4x4 (the permutation
      table) and zigzag_rle(quant_4x4) (the reference function;
      unzigzag_rle is the inverse used by the decoder).

      Sky130 sky130_fd_sc_hd constraints: Verilog-2005, sync, no
      latches, no async resets, no tri-states.

  expgolomb_enc:
    tier: 1
    rtl_target: "rtl/multiframe_codec/expgolomb_enc.v"
    testbench: "tb/cocotb/test_expgolomb_enc.py"
    python_source: "examples/multiframe_codec/codec_golden.py"
    description: |
      Exp-Golomb encoder identical to PyH264 semantics; per-coefficient
      VLC for the (run, level) pairs coming out of zigzag_rle.  For each
      pair the block emits TWO codewords back-to-back:
        (1) codeword for `run`   (unsigned, value >= 0)
        (2) codeword for `level` (signed, sign-mapping per PyH264:
                                  +N -> codenum 2N-1, -N -> codenum 2N,
                                  0  -> codenum 0)
      An EOB pair (run=0, level=0, eob=1) emits the single bit '1'.

      Encoding rule (codenum -> codeword):
        codeword = bin(codenum + 1) with (bit_length(codenum+1) - 1)
        leading zeros prepended.  length = 2*bit_length(codenum+1) - 1.
        Examples: 0 -> '1', 1 -> '010', -1 -> '011', 2 -> '00100', ...

      AXI-Stream interface:
        input  [3:0]  s_run_tdata
        input  [15:0] s_level_tdata    // signed
        input         s_eob_tdata      // 1 = encode '1' bit, no level
        input         s_tvalid
        input         s_tlast
        output        s_tready
        output [31:0] m_code_tdata     // MSB-aligned codeword
        output [5:0]  m_code_len       // 1..32 valid bits
        output        m_tvalid
        output        m_tlast
        input         m_tready
        output        err_o            // codeword would exceed 32 bits

      Golden reference in codec_golden.py: expgolomb_encode(v) (used for
      both the run field and the level field; the run uses the unsigned
      half of the mapping by passing nonnegative ints).

      Implementation hint: a single leading-one detector on (codenum+1)
      gives length and codeword in one cycle.

      Sky130 sky130_fd_sc_hd constraints: Verilog-2005, sync, no
      latches, no async resets, no tri-states.

  block_packer:
    tier: 1
    rtl_target: "rtl/multiframe_codec/block_packer.v"
    testbench: "tb/cocotb/test_block_packer.py"
    python_source: "examples/multiframe_codec/codec_golden.py"
    description: |
      Bit-packing serializer.  Receives (codeword, length) pairs from
      expgolomb_enc and packs them MSB-first into a byte-aligned output
      stream.  After tlast on the final pair of a frame, the packer
      flushes the partial byte with zero-bit padding and emits a byte
      with m_tlast=1.

      AXI-Stream interface:
        input  [31:0] s_code_tdata
        input  [5:0]  s_code_len       // 1..32 valid bits, MSB-aligned
        input         s_tvalid
        input         s_tlast          // last codeword of the frame
        output        s_tready
        // Optional: a 1-bit frame_type prefix at the start of a frame.
        // The packer asserts this as the very first bit of a new frame
        // (driven by the encode_image header rule in codec_golden).
        input         s_frame_is_intra
        output [7:0]  m_byte_tdata
        output        m_byte_tvalid
        output        m_byte_tlast
        input         m_byte_tready

      Implementation: a shift register at least 39 bits wide (32-bit
      codeword + up to 7 bits of carryover) feeds a one-byte emitter
      that fires whenever the accumulated bit count >= 8.  On s_tlast
      the packer waits for the final codeword to be fully consumed,
      flushes the residual partial byte with zero padding, and asserts
      m_byte_tlast on that flush byte.

      Golden reference in codec_golden.py: pack_block(pairs,
      frame_is_intra) and the byte-flushing logic in encode_image()
      that turns the bit string into the final byte stream.

      Sky130 sky130_fd_sc_hd constraints: Verilog-2005, sync, no
      latches, no async resets, no tri-states.
