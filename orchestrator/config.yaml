# socmate ASIC Orchestrator Configuration
# ======================================

project:
  name: socmate-asic
  target_pdk: sky130
  target_clock_mhz: 50
  rtl_language: verilog-2005
  synthesis_tool: yosys
  process_constraints: "No tri-state buffers, no async resets, no latches (Sky130 limitations)."

# Backend physical design tool configuration (Nix-wrapped)
backend:
  openroad_binary: "scripts/openroad-nix.sh"
  magic_binary: "scripts/magic-nix.sh"
  netgen_binary: "scripts/netgen-nix.sh"
  yosys_binary: "scripts/yosys-nix.sh"
  pdk_variant: "sky130A"
  std_cell_lib: "sky130_fd_sc_hd"
  rcx_rules: ".pdk/sky130A/libs.tech/rcx/sky130hd_rcx_patterns.rules"
  target_utilization: 45
  target_density: 0.6
  pnr_timeout_s: 1800
  drc_timeout_s: 600
  lvs_timeout_s: 600
  klayout_binary: "scripts/klayout-nix.sh"

# Tapeout (OpenFrame shuttle submission)
tapeout:
  target: "openframe"
  die_width_um: 3520.0
  die_height_um: 5188.0
  core_margin_um: 100.0
  io_pads: 44
  wrapper_pnr_timeout_s: 3600
  wrapper_drc_timeout_s: 1200
  precheck_timeout_s: 1800

# Golden model directories to scan for block diagram grounding.
# Uncomment and customise for your project.  If absent, auto-discovery is used.
# golden_model_dirs:
#   - path: "models/my_dsp"
#     label: "DSP blocks"

# Temporal workflow engine
temporal:
  address: "localhost:7233"
  namespace: "socmate-asic"
  task_queue: "asic-pipeline"

  # Default retry policies
  retry_policies:
    rtl_generation:
      initial_interval_s: 10
      backoff_coefficient: 2.0
      maximum_interval_s: 300
      maximum_attempts: 5
    eda_tools:
      initial_interval_s: 30
      backoff_coefficient: 1.5
      maximum_interval_s: 600
      maximum_attempts: 3
    simulation:
      initial_interval_s: 60
      backoff_coefficient: 2.0
      maximum_interval_s: 1800
      maximum_attempts: 3

  # Activity timeouts
  timeouts:
    rtl_generation_s: 300
    lint_s: 60
    testbench_generation_s: 300
    simulation_s: 7200        # 2 hours (Viterbi sim is slow)
    synthesis_s: 3600
    sta_s: 600
    pnr_s: 7200
    drc_s: 1800
    lvs_s: 1800
    failure_analysis_s: 300

# LangChain agent configuration
# Provider: Claude CLI (install: npm install -g @anthropic-ai/claude-code)
langchain:
  model: "opus-4.7"
  temperature: 0.1
  max_tokens: 16000

  agents:
    rtl_generator:
      system_prompt_file: "langchain/prompts/rtl_generator.md"
      tools: ["file_read", "file_write", "yosys_lint", "verilator_lint"]
    testbench_generator:
      system_prompt_file: "langchain/prompts/testbench_generator.md"
      tools: ["file_read", "file_write", "cocotb_template"]
    debug:
      system_prompt_file: "langchain/prompts/debug_agent.md"
      tools: ["file_read", "waveform_summary", "signal_trace", "rtl_grep"]
    timing_closure:
      system_prompt_file: "langchain/prompts/timing_closure.md"
      tools: ["file_read", "file_write", "opensta_report", "insert_pipeline_stage"]

# OpenTelemetry tracing (lightweight SQLite-backed collector)
telemetry:
  enabled: true
  trace_db: ".socmate/traces.db"

# Block registry -- maps Python source to RTL target.
# OPTIONAL: If omitted, blocks come from .socmate/block_specs.json (architecture output)
# or from an external file via start_pipeline(blocks_file="...").
blocks:
  mcu3:
    tier: 1
    rtl_target: "rtl/mcu3/mcu3.v"
    testbench: "tb/cocotb/test_mcu3.py"
    description: |
      3-stage pipelined microcontroller, custom 16-bit ISA, single clock.

      Stages:
        S1 FETCH         : PC -> imem read; PC = PC+1 unless branch taken.
        S2 DECODE/EXEC   : decode opcode/regs, read regfile, ALU compute, branch decision.
        S3 WRITEBACK     : write ALU result back to destination register.

      Pipeline registers between every stage. No data forwarding required for
      this ISA: only RAW hazard is rd_S3 -> rs_S2, and the ISA is simple enough
      that a 1-bubble stall on dependent reads is acceptable. Implement a
      simple stall detector that holds PC and inserts a NOP into S2 when the
      instruction in S2 reads a register the instruction in S3 will write.

      ISA (16-bit instructions, 3-bit opcode, 3-bit rd, 3-bit rs1, 3-bit rs2 / 7-bit imm):
        000 NOP                            (no-op)
        001 ADD  rd, rs1, rs2              rd = rs1 + rs2
        010 SUB  rd, rs1, rs2              rd = rs1 - rs2
        011 AND  rd, rs1, rs2              rd = rs1 & rs2
        100 OR   rd, rs1, rs2              rd = rs1 | rs2
        101 XOR  rd, rs1, rs2              rd = rs1 ^ rs2
        110 LDI  rd, imm7                  rd = sign_extend(imm7)
        111 BRZ  rs1, imm7                 if (rs1 == 0) PC = PC + sign_extend(imm7)

      Register file: 8 entries x 16 bits, register 0 is hard-wired to zero.
      Reset: synchronous active-low rst_n; on reset PC=0 and all regs=0.
      Instruction memory: external ports `imem_addr` (12-bit) and `imem_data`
      (16-bit, 1-cycle synchronous read) — DUT only reads, no imem write port.
      No data memory in this MCU.

      Outputs: `pc[11:0]` and `dbg_r1[15:0]` (value of register 1, for testbench
      observability). All outputs registered.

      Constraints: no async resets, no latches, no tri-states (Sky130). Use
      Verilog-2005. Target ~50 MHz on Sky130 sky130_fd_sc_hd.

# Observer LLM (generates .socmate/summary_*.md after significant node transitions)
observer:
  enabled: true
  cooldown_s: 300  # minimum seconds between observer LLM calls per stage

# Architecture stage configuration
architecture:
  max_block_attempts: 5
  pdk_config: "pdk/configs/sky130.yaml"
  benchmark_timeout_s: 60
  benchmark_cache_db: ".socmate/benchmark_cache.db"
  state_dir: ".socmate"
  revision_triggers:
    - "simulation_fail_after_max_retries"
    - "timing_violation_unfixable"
    - "area_exceeds_budget"
    - "interface_incompatibility"
