#
# Smoke-test the published socmate image against a 3-stage MCU spec.
# Pulls ghcr.io/facebookexperimental/socmate:latest, runs preflight,
# then drives the LangGraph pipeline against examples/mcu3/blocks.yaml
# to verify the image can produce RTL + simulate + synthesise an actual
# pipelined design (not just the trivial adder8 demo).
#
# Triggers:
#   - push to test/mcu3-pipeline (auto-runs on each push to that branch)
#   - workflow_dispatch (manual rerun once on main)

name: Test MCU3 pipeline

on:
  push:
    branches: [test/mcu3-pipeline]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  test-mcu3:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: ${{ github.repository == 'facebookexperimental/socmate' }}

    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest gives ~14 GB free; openlane2 (~4 GB extracted) +
      # nix-channel update + Sky130 PDK (~2 GB) push past that. Free
      # ~25 GB up-front by stripping preinstalled toolchains we don't use.
      - name: Free runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune -af || true
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io (for cache + base layers)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the in-PR Dockerfile rather than pulling the published
      # `:latest` -- so we test what's on the branch (entrypoint fixes,
      # requirements changes, etc.) instead of whatever's stuck on main.
      - name: Build socmate image from PR branch
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: socmate:pr-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Preflight (toolchain sanity)
        run: |
          docker run --rm \
            socmate:pr-test \
            make preflight

      - name: Check Claude credentials presence
        id: creds
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline (mcu3 blocks.yaml)
        if: steps.creds.outputs.have_token == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          mkdir -p _artifacts
          docker run --rm \
            -e SOCMATE_MODE=pipeline \
            -e SOCMATE_BLOCKS_FILE=/socmate/examples/mcu3/blocks.yaml \
            -e CLAUDE_CODE_OAUTH_TOKEN \
            -v "${{ github.workspace }}/examples/mcu3:/socmate/examples/mcu3:ro" \
            -v "${{ github.workspace }}/_artifacts:/socmate/_artifacts:rw" \
            socmate:pr-test \
            2>&1 | tee _artifacts/pipeline.log

      - name: Show what was generated
        if: always() && steps.creds.outputs.have_token == 'true'
        run: |
          echo "=== _artifacts ==="
          ls -laR _artifacts || true
          echo
          echo "=== pipeline log tail ==="
          tail -120 _artifacts/pipeline.log || true

      - name: Upload artifacts
        if: always() && steps.creds.outputs.have_token == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mcu3-pipeline-output
          path: _artifacts/
          retention-days: 7

      - name: Summarise
        if: always()
        run: |
          {
            echo "### MCU3 pipeline test"
            echo
            if [ "${{ steps.creds.outputs.have_token }}" = "true" ]; then
              echo "- ✅ Toolchain preflight: passed"
              echo "- 🤖 LLM pipeline run: see job log + uploaded artifacts"
            else
              echo "- ✅ Toolchain preflight: passed"
              echo "- ⏭️ LLM pipeline run: skipped (no CLAUDE_CODE_OAUTH_TOKEN secret)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
