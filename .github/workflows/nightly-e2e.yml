#
# Nightly end-to-end smoke test:
#   1. Build the Dockerfile (catches Yosys / Verilator / OpenROAD / cocotb
#      upstream breakage and Sky130 PDK URL rot)
#   2. Run `make preflight` inside the container to verify the toolchain
#   3. Run `make demo` (the 8-bit adder reference design) end-to-end:
#      RTL gen -> lint -> testbench -> sim -> synthesis
#
# Requires the CLAUDE_CODE_OAUTH_TOKEN repo secret. If it's not configured
# the LLM steps are skipped and only the toolchain build is exercised --
# we still catch most upstream breakage that way.

name: Nightly E2E

on:
  schedule:
    # 07:00 UTC daily -- after most upstream nightlies have published.
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allow manual runs from the Actions tab for debugging.

jobs:
  docker-build:
    name: Build container
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build socmate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: socmate:nightly
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Preflight check inside container
        run: |
          docker run --rm socmate:nightly bash -lc 'cd /socmate && make preflight'

  e2e-demo:
    name: Run make demo on adder8
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 30
    # Skip the LLM-driven leg if the auth secret isn't configured -- avoids
    # noisy red CI on forks that haven't wired up a token.
    if: ${{ github.repository == 'facebookexperimental/socmate' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore socmate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          tags: socmate:nightly
          load: true
          cache-from: type=gha

      - name: Check secret presence
        id: have_token
        run: |
          if [ -n "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run make demo
        if: steps.have_token.outputs.present == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          docker run --rm \
              -e CLAUDE_CODE_OAUTH_TOKEN \
              -e SOCMATE_MODEL=sonnet-4.6 \
              -v "${{ github.workspace }}/.socmate:/socmate/.socmate" \
              socmate:nightly bash -lc 'cd /socmate && make demo'

      - name: Skip note (no token)
        if: steps.have_token.outputs.present != 'true'
        run: |
          echo "::notice::CLAUDE_CODE_OAUTH_TOKEN not configured; skipping LLM-driven demo leg."
          echo "The Docker build + preflight check still ran in the docker-build job."

      - name: Upload pipeline artifacts
        if: always() && steps.have_token.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_id }}
          path: |
            .socmate/pipeline_results.json
            .socmate/pipeline_events.jsonl
            .socmate/traces.db
            rtl/adder8/
            syn/output/adder8/
          if-no-files-found: ignore
          retention-days: 14
